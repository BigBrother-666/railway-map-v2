# 生产 nginx：443 终止 TLS，一个 server 同时发前端页面 + 代理 /api/（含 wss 实时）
# + 代理 /internal/plugin（插件 wss）。80 只做 ACME 验证与跳转 443。

# HTTP：放行 Let's Encrypt 续期验证，其余全部 301 到 https
server {
  listen 80;
  server_name railwaymap.big-brother.top;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}
# HTTPS：TLS 终止 + 应用流量
server {
  listen 443 ssl;
  http2 on;
  server_name railwaymap.big-brother.top;

  ssl_certificate     /etc/letsencrypt/live/railwaymap.big-brother.top/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/railwaymap.big-brother.top/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  root /usr/share/nginx/html;
  index index.html;

  # 后端 API（/api/v1/realtime 是前端 wss，Upgrade 头已带）
  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }

  # 插件长连接 wss：大快照 + 长超时
  location /internal/plugin {
    proxy_pass http://backend:8080/internal/plugin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    client_max_body_size 128m;
  }

  location /health {
    proxy_pass http://backend:8080/health;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
